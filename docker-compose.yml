services:
  nginx:
    image: nginx:1.27-alpine
    container_name: target-nginx
    depends_on:
      app:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  app:
    image: python:3.12-slim
    container_name: target-app
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    env_file:
      - ./app/app.env
    volumes:
      - ./app:/app
    command:
      - sh
      - -c
      - pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port "$${APP_PORT:-8000}"
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: target-db
    env_file:
      - ./db/mysql.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
