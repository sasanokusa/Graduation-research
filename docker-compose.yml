name: llm-recovery-lab

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  app:
    image: python:3.12-slim
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_healthy
      metrics:
        condition: service_started
    working_dir: /app
    env_file:
      - ./app/app.env
    volumes:
      - ./app:/app
    command:
      - sh
      - -c
      - pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port "$${APP_PORT:-8000}"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/healthz' % os.getenv('APP_PORT', '8000'), timeout=3).read()"
      interval: 5s
      timeout: 4s
      retries: 60
      start_period: 20s
    restart: unless-stopped

  db:
    image: mysql:8.4
    env_file:
      - ./db/mysql.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  queue:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  worker:
    image: python:3.12-slim
    depends_on:
      queue:
        condition: service_healthy
    environment:
      QUEUE_HOST: queue
      WORKER_HOST_GROUP: host-B
    command:
      - sh
      - -c
      - |
        python -u - <<'PY'
        import os
        import socket
        import time

        queue_host = os.getenv("QUEUE_HOST", "queue")
        while True:
            try:
                with socket.create_connection((queue_host, 6379), timeout=2):
                    print(f"worker heartbeat queue={queue_host}", flush=True)
            except Exception as exc:
                print(f"worker queue probe failed: {exc}", flush=True)
            time.sleep(10)
        PY
    restart: unless-stopped

  metrics:
    image: python:3.12-slim
    command: ["python", "-m", "http.server", "9090"]
    restart: unless-stopped

volumes:
  mysql_data:
