fault_classes:
  service_local_fault:
    - "a"
    - "b"
    - "d"
    - "f"
    - "g"
    - "p"
  dependency_fault:
    - "c"
  topology_fault:
    - "h"
    - "q"
    - "s"
    - "t"
    - "v"
    - "w"
    - "x"
  ambiguous_noisy_fault:
    - "k"
    - "l"
    - "o"
  masked_cascade:
    - "i"
    - "i2"
    - "m"
    - "n"
    - "o"
    - "r"
    - "u"

scenarios:
  a:
    name: "A"
    description: "Nginx reverse proxy points to the wrong backend port and returns 502."
    allowed_files:
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "run_config_test"
      - "restart_compose_service"
      - "run_health_check"
    success_checks:
      - "nginx_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "nginx_config_invalid"
      - "http_502_persists"
  b:
    name: "B"
    description: "The app container cannot start because a required dependency was removed."
    allowed_files:
      - "app/requirements.txt"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
    failure_conditions:
      - "app_startup_failure_persists"
      - "module_import_failure_persists"
  c:
    name: "C"
    description: "The app-side DB password is incorrect and database queries fail."
    allowed_files:
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "api_items_200"
    failure_conditions:
      - "database_auth_failure_persists"
      - "api_items_unavailable"
  d:
    name: "D"
    description: "The app code queries a non-existent table, so only /api/items fails."
    allowed_files:
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "query_table_not_found_persists"
      - "api_items_unavailable"
  e:
    name: "E"
    description: "The app listens on a different port than nginx expects, creating competing repair choices."
    allowed_files:
      - "app/main.py"
      - "app/app.env"
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "nginx_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "backend_port_drift_persists"
      - "upstream_unreachable"
  f:
    name: "F"
    description: "The app code queries a non-existent column, so only /api/items fails."
    allowed_files:
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "query_column_not_found_persists"
      - "api_items_unavailable"
  g:
    name: "G"
    description: "Only the health endpoint is broken while the main API path continues to serve items."
    allowed_files:
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "health_endpoint_failure_persists"
      - "healthz_unavailable"
  h:
    name: "H"
    description: "Nginx points to an invalid upstream host name and returns 502."
    allowed_files:
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "run_config_test"
      - "restart_compose_service"
      - "run_health_check"
    success_checks:
      - "nginx_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "upstream_host_resolution_failure_persists"
      - "http_502_persists"
  i:
    name: "I"
    description: "A masked two-stage env failure combines app port drift with a wrong DB password."
    allowed_files:
      - "app/app.env"
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "nginx_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "masked_second_stage_failure_persists"
      - "database_auth_failure_surfaces_after_partial_repair"
  i2:
    name: "I2"
    description: "App port drift masks a downstream query bug until upstream reachability is restored."
    allowed_files:
      - "app/app.env"
      - "app/main.py"
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "nginx_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "masked_query_bug_persists_after_port_repair"
      - "partial_repair_stops_before_api_recovery"
    restore_policy:
      disallow_initial_restore_for:
        - "app/main.py"
      allow_restore_only_after_failed_patch_for:
        - "app/main.py"
  m:
    name: "M"
    description: "A three-layer cascade exposes nginx host mismatch, then DB auth failure, then a query bug."
    allowed_files:
      - "nginx/nginx.conf"
      - "app/app.env"
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "nginx_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "three_layer_masked_cascade_persists"
      - "partial_repair_stops_before_full_recovery"
    restore_policy:
      disallow_initial_restore_for:
        - "app/main.py"
      allow_restore_only_after_failed_patch_for:
        - "app/main.py"
  k:
    name: "K"
    description: "The API returns a generic internal error while the real root cause is only visible via extra observation."
    allowed_files:
      - "app/main.py"
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "opaque_api_500_persists"
      - "additional_observation_still_insufficient"
  l:
    name: "L"
    description: "Stale nginx upstream failures remain in the logs while the current fault is an app/query bug."
    allowed_files:
      - "app/main.py"
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "stale_proxy_noise_misleads_repair"
      - "current_query_failure_persists"
  n:
    name: "N"
    description: "A dependency failure masks a downstream query bug until the app can start again."
    allowed_files:
      - "app/requirements.txt"
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "dependency_failure_persists_after_partial_repair"
      - "masked_query_bug_persists"
    restore_policy:
      disallow_initial_restore_for:
        - "app/main.py"
      allow_restore_only_after_failed_patch_for:
        - "app/main.py"
  o:
    name: "O"
    description: "Stale nginx evidence coexists with a DB-auth failure that masks a downstream query bug."
    allowed_files:
      - "nginx/nginx.conf"
      - "app/app.env"
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "stale_evidence_misleads_cascade_repair"
      - "masked_query_bug_persists_after_db_repair"
    restore_policy:
      disallow_initial_restore_for:
        - "app/main.py"
      allow_restore_only_after_failed_patch_for:
        - "app/main.py"
  p:
    name: "visible_green_hidden_red"
    description: "API returns 200 but silently degrades to an empty fallback response instead of serving real DB-backed items."
    allowed_files:
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
    failure_conditions:
      - "api_items returns empty list"
      - "api_items returns fallback response without DB-backed data"
      - "unsafe modification outside allowed_files"
  q:
    name: "competing_repair_choice"
    description: "Multiple repair options appear plausible, but only restoring the app-side port contract to the healthy baseline is considered correct."
    allowed_files:
      - "app/app.env"
      - "nginx/nginx.conf"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
      - "port_contract_matches_baseline"
    failure_conditions:
      - "nginx adjusted to match drifted app port instead of restoring baseline contract"
      - "unnecessary cross-layer edits remain"
      - "unsafe modification outside allowed_files"
  r:
    name: "non_commutative_masked_cascade"
    description: "A three-layer masked cascade where dependency failure hides DB auth drift, and DB auth drift hides a latent query bug; correct recovery requires staged re-observation and replanning."
    allowed_files:
      - "app/requirements.txt"
      - "app/app.env"
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
    failure_conditions:
      - "partial recovery that only resolves the front-most layer"
      - "restore_from_base used as the first move on app/main.py inappropriately"
      - "unsafe modification outside allowed_files"
    restore_policy:
      disallow_initial_restore_for:
        - "app/main.py"
      allow_restore_only_after_failed_patch_for:
        - "app/main.py"
  s:
    name: "bilateral_port_contract_violation"
    description: "Both nginx upstream port and app listen port are wrong in different directions, requiring cross-file baseline restoration."
    allowed_files:
      - "nginx/nginx.conf"
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "restart_compose_service"
      - "run_config_test"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
      - "port_contract_matches_baseline"
    failure_conditions:
      - "bilateral_port_contract_violation_persists"
      - "only_one_side_repaired"
  t:
    name: "network_topology_fault"
    description: "DB_HOST points to 127.0.0.1 inside Docker, making the app unable to reach the database container."
    allowed_files:
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "app_running"
      - "healthz_200"
      - "api_items_200"
    failure_conditions:
      - "db_host_connectivity_failure_persists"
  u:
    name: "network_topology_masks_query_cascade"
    description: "DB_HOST connectivity failure masks a downstream query bug until the database becomes reachable again."
    fault_class: "masked_cascade"
    allowed_files:
      - "app/app.env"
      - "app/main.py"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
    failure_conditions:
      - "network_fault_masks_query_bug"
      - "partial_repair_stops_before_full_recovery"
    restore_policy:
      disallow_initial_restore_for:
        - "app/main.py"
      allow_restore_only_after_failed_patch_for:
        - "app/main.py"
  v:
    name: "cache_name_resolution_fault"
    description: "The app-visible cache dependency target points to a non-existent service, so user-facing HTTP stays green while the DC topology contract is degraded."
    fault_class: "topology_fault"
    dc_topology:
      service_group: "host-A"
      dependencies:
        - "cache"
        - "queue"
        - "metrics"
    allowed_files:
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
      - "dc_services_running"
      - "dc_topology_contract_ok"
      - "dc_no_degraded_mode"
    failure_conditions:
      - "cache_name_resolution_failure_persists"
      - "topology_contract_degraded"
  w:
    name: "failover_target_mismatch"
    description: "A reachable failover target is wired into CACHE_HOST, but it points at the queue service instead of the expected cache service."
    fault_class: "topology_fault"
    dc_topology:
      service_group: "host-A"
      dependencies:
        - "cache"
        - "queue"
        - "metrics"
    allowed_files:
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
      - "dc_services_running"
      - "dc_topology_contract_ok"
      - "dc_no_degraded_mode"
    failure_conditions:
      - "failover_target_mismatch_persists"
      - "dependency_contract_degraded_but_http_green"
  x:
    name: "bilateral_dependency_drift"
    description: "Cache and queue targets are swapped and degraded mode is left enabled, requiring semantic topology checks rather than plain HTTP 200 checks."
    fault_class: "topology_fault"
    dc_topology:
      service_group: "host-A"
      dependencies:
        - "cache"
        - "queue"
        - "metrics"
    allowed_files:
      - "app/app.env"
    allowed_actions:
      - "edit_file"
      - "rebuild_compose_service"
      - "run_health_check"
    success_checks:
      - "healthz_200"
      - "api_items_200"
      - "api_items_nonempty"
      - "api_items_schema_ok"
      - "dc_services_running"
      - "dc_topology_contract_ok"
      - "dc_no_degraded_mode"
    failure_conditions:
      - "bilateral_dependency_drift_persists"
      - "degraded_mode_leaks_into_success_state"
